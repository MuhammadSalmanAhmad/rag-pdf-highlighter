name: Build and Push Docker Image to Amazon ECR

on:
  push:
    branches:
      - develop
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ecr-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'eu-central-1' }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY || github.event.repository.name }}

jobs:
  build-and-push:
    name: Build and Push
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Validate workflow configuration
        env:
          AWS_ROLE_TO_ASSUME: ${{ vars.AWS_ROLE_TO_ASSUME }}
        run: |
          test -n "$AWS_ROLE_TO_ASSUME" || {
            echo "Set repository variable AWS_ROLE_TO_ASSUME to the IAM role ARN GitHub Actions should assume."
            exit 1
          }
          test -n "$AWS_REGION" || {
            echo "Set repository variable AWS_REGION, for example us-east-1."
            exit 1
          }
          test -n "$ECR_REPOSITORY" || {
            echo "Set repository variable ECR_REPOSITORY to the target ECR repository name."
            exit 1
          }

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          mask-aws-account-id: true

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Resolve ECR image
        id: ecr-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          if [[ "$ECR_REPOSITORY" == *".amazonaws.com/"* ]]; then
            image="$ECR_REPOSITORY"
          else
            image="$ECR_REGISTRY/$ECR_REPOSITORY"
          fi
          echo "image=$image" >> "$GITHUB_OUTPUT"
          echo "image_uri=$image:$GITHUB_SHA" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          load: true
          platforms: linux/amd64
          tags: ${{ steps.ecr-image.outputs.image_uri }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: ${{ steps.ecr-image.outputs.image_uri }}
          format: table
          severity: HIGH,CRITICAL
          vuln-type: os,library
          ignore-unfixed: true
          exit-code: 1

      - name: Push Docker image
        env:
          IMAGE_URI: ${{ steps.ecr-image.outputs.image_uri }}
        run: docker push "$IMAGE_URI"
